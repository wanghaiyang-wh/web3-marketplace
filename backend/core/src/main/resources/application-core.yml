spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/web3_marketplace?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=30&socketTimeout=30}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1
      keepalive-time: 30000
      max-lifetime: 180000
      maximum-pool-size: 5
  # Redis配置（如果需要可以取消注释）
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
